name: Build Windows portable

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-mcp.txt pyinstaller

      - name: Build portable app
        run: python build_portable.py

      - name: Normalize release ZIP name
        shell: pwsh
        run: |
          if (Test-Path "coursepack-local-portable-win32.zip") {
            Copy-Item "coursepack-local-portable-win32.zip" "coursepack-local-portable-win64.zip" -Force
          } elseif (Test-Path "coursepack-local-portable-win-amd64.zip") {
            Copy-Item "coursepack-local-portable-win-amd64.zip" "coursepack-local-portable-win64.zip" -Force
          } else {
            $zip = Get-ChildItem -Filter "coursepack-local-portable-*.zip" | Select-Object -First 1
            if (-not $zip) { throw "Portable ZIP not found after build." }
            Copy-Item $zip.FullName "coursepack-local-portable-win64.zip" -Force
          }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: coursepack-local-portable-win64
          path: coursepack-local-portable-win64.zip

      - name: Publish GitHub Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: coursepack-local-portable-win64.zip
          generate_release_notes: true
